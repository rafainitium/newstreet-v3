<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team — Newstreet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Murecho:wght@100..900&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     RESET / VARS
     ============================================================ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  :root {
    --bg: #efece6;
    --ink: #0e0e0e;
    --ink-soft: #4a4a4a;
    --line: rgba(0,0,0,0.12);
    --dark: #161616;
    --ls-display: -0.075em;
    --ls-headline: -0.06em;
    --ls-body: -0.038em;
    --ls-small: -0.02em;
    --ease: cubic-bezier(0.7, 0, 0.2, 1);
    --ease-out: cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  body {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  img, video { display: block; max-width: 100%; }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; }

  /* ============================================================
     NAV
     ============================================================ */
  .nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 32px;
    color: #fff;
    opacity: 0;
    transition: padding 0.5s var(--ease), opacity 0.8s ease 0.1s;
  }
  body.is-ready .nav { opacity: 1; }
  .nav::before {
    content: '';
    position: absolute; inset: 0;
    background: rgba(18, 18, 18, 0.78);
    backdrop-filter: blur(16px) saturate(140%);
    -webkit-backdrop-filter: blur(16px) saturate(140%);
    transform: translateY(-100%);
    transition: transform 0.6s var(--ease);
    z-index: -1;
  }
  .nav::after {
    content: '';
    position: absolute;
    left: 50%; right: 50%; bottom: 0;
    height: 1px;
    background: rgba(255,255,255,0.18);
    transition: left 0.7s var(--ease) 0.1s, right 0.7s var(--ease) 0.1s;
  }
  .nav.is-scrolled::before { transform: translateY(0); }
  .nav.is-scrolled::after  { left: 0; right: 0; }
  .nav.is-scrolled { padding: 16px 32px; }
  .nav__brand {
    font-size: 19px; font-weight: 700;
    letter-spacing: var(--ls-display); line-height: 1; z-index: 1;
  }
  .nav__brand .street { font-weight: 200; }
  .nav__links { display: flex; gap: 30px; z-index: 1; }
  .nav__link {
    position: relative;
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.22em; text-transform: uppercase; padding: 8px 0;
  }
  .nav__link::after {
    content: ''; position: absolute; left: 0; right: 0; bottom: 2px;
    height: 1px; background: currentColor;
    transform: scaleX(0); transform-origin: left;
    transition: transform 0.45s var(--ease);
  }
  .nav__link:hover::after { transform: scaleX(1); }
  .nav__link.is-active::after { transform: scaleX(1); opacity: 0.55; }
  .nav__item--dropdown { position: relative; }
  .nav__link--trigger {
    background: none; border: none; color: inherit;
    font-family: inherit; font-size: 11px; font-weight: 500;
    letter-spacing: 0.22em; text-transform: uppercase;
    padding: 8px 0; display: inline-flex; align-items: center; gap: 7px;
    position: relative;
  }
  .nav__link--trigger::after {
    content: ''; position: absolute; left: 0; right: 18px; bottom: 2px;
    height: 1px; background: currentColor;
    transform: scaleX(0); transform-origin: left;
    transition: transform 0.45s var(--ease);
  }
  .nav__link--trigger:hover::after { transform: scaleX(1); }
  .nav__link--trigger.is-active::after { transform: scaleX(1); opacity: 0.55; }
  .nav__caret {
    font-size: 8px; opacity: 0.6; display: inline-block;
    transition: transform 0.3s var(--ease);
  }
  .nav__item--dropdown:hover .nav__caret,
  .nav__item--dropdown:focus-within .nav__caret { transform: rotate(180deg); }
  .nav__dropdown {
    position: absolute; top: 100%; left: 50%;
    transform: translateX(-50%) translateY(-6px);
    margin-top: 12px;
    background: rgba(18,18,18,0.94);
    backdrop-filter: blur(20px) saturate(140%);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
    padding: 18px 24px;
    display: flex; flex-direction: column; gap: 14px;
    border: 1px solid rgba(255,255,255,0.08);
    opacity: 0; pointer-events: none;
    transition: opacity 0.28s var(--ease), transform 0.28s var(--ease);
    min-width: 200px;
  }
  .nav__dropdown::before {
    content: ''; position: absolute; bottom: 100%; left: 0; right: 0; height: 14px;
  }
  .nav__item--dropdown:hover .nav__dropdown,
  .nav__item--dropdown:focus-within .nav__dropdown {
    opacity: 1; pointer-events: all; transform: translateX(-50%) translateY(0);
  }
  .nav__dropdown-link {
    position: relative;
    font-size: 11px; font-weight: 500; letter-spacing: 0.22em;
    text-transform: uppercase; white-space: nowrap; color: #fff; padding: 2px 0;
  }
  .nav__dropdown-link::after {
    content: ''; position: absolute; left: 0; right: 0; bottom: -2px;
    height: 1px; background: currentColor;
    transform: scaleX(0); transform-origin: left;
    transition: transform 0.35s var(--ease);
  }
  .nav__dropdown-link:hover::after,
  .nav__dropdown-link.is-active::after { transform: scaleX(1); }

  /* ============================================================
     INTRO — tagline + copy
     ============================================================ */
  .team-intro {
    padding: 60px 36px 40px;
    max-width: 1500px;
    margin: 0 auto;
  }
  .team-intro__tagline {
    font-family: 'Murecho', sans-serif;
    font-size: clamp(28px, 3.8vw, 58px);
    font-weight: 400;
    letter-spacing: -0.07em;
    line-height: 0.96;
  }
  .team-intro__body {
    font-size: clamp(13px, 1.25vw, 30px);
    line-height: 1.45;
    letter-spacing: var(--ls-body);
    font-weight: 300;
    display: flex;
    flex-direction: column;
    gap: 22px;
    color: var(--ink);
  }

  /* ============================================================
     TEAM GRID
     ============================================================ */
  .team-section {
    padding: 0 36px 140px;
    max-width: 1500px;
    margin: 0 auto;
  }
  .team-section__eyebrow {
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    opacity: 0.55;
    margin-bottom: 60px;
    padding-top: 20px;
    border-top: 1px solid var(--line);
  }

  /* Row groups — each holds 3 cards + a drawer */
  .member-row-group { margin-bottom: 0; }

  .member-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
    margin-bottom: 0;
  }

  /* Individual card */
  .member-card {
    position: relative;
    cursor: pointer;
  }
  .member-card__photo {
    position: relative;
    width: 100%;
    aspect-ratio: 4 / 5;
    overflow: hidden;
    background: #d0cec9;
  }
  .member-card__photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
    transition: transform 1.1s var(--ease-out);
    filter: grayscale(15%);
  }
  .member-card:hover .member-card__photo img { transform: scale(1.04); }

  /* Placeholder photo when no image */
  .member-card__photo-placeholder {
    width: 100%; height: 100%;
    background: linear-gradient(160deg, #d8d4cc 0%, #c4bfb5 100%);
    display: flex; align-items: center; justify-content: center;
  }
  .member-card__photo-placeholder svg {
    opacity: 0.25;
    width: 60px; height: 60px;
  }

  .member-card__info {
    padding: 18px 0 0;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
  }
  .member-card__text { flex: 1; }
  .member-card__name {
    font-family: 'Murecho', sans-serif;
    font-size: clamp(18px, 1.6vw, 24px);
    font-weight: 400;
    letter-spacing: -0.06em;
    line-height: 1.05;
    margin-bottom: 6px;
  }
  .member-card__role {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    opacity: 0.55;
  }

  /* Expand button */
  .member-card__toggle {
    flex: 0 0 auto;
    width: 34px; height: 34px;
    border-radius: 50%;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--ink);
    font-size: 18px;
    font-weight: 200;
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
    margin-top: 4px;
    transition: background 0.35s var(--ease), border-color 0.35s var(--ease),
                color 0.35s var(--ease), transform 0.45s var(--ease);
  }
  .member-card__toggle:hover { border-color: var(--ink); }
  .member-card.is-open .member-card__toggle {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--bg);
    transform: rotate(45deg);
  }

  /* Bio drawer */
  .member-drawer {
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.7s var(--ease-out), opacity 0.5s var(--ease-out),
                margin 0.5s var(--ease-out);
    opacity: 0;
    border-top: 0px solid var(--line);
    margin-top: 0;
  }
  .member-drawer.is-open {
    max-height: 700px;
    opacity: 1;
    border-top: 1px solid var(--line);
    margin-top: 36px;
    margin-bottom: 48px;
  }
  .member-drawer__inner {
    padding: 48px 0 24px;
    display: grid;
    grid-template-columns: 1fr 1.8fr;
    gap: 60px;
    align-items: start;
  }
  .member-drawer__name-block {}
  .member-drawer__name {
    font-family: 'Murecho', sans-serif;
    font-size: clamp(24px, 2.5vw, 40px);
    font-weight: 400;
    letter-spacing: -0.07em;
    line-height: 0.95;
    margin-bottom: 10px;
  }
  .member-drawer__role {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    opacity: 0.55;
  }
  .member-drawer__bio {
    font-size: clamp(13px, 1.25vw, 30px);
    line-height: 1.45;
    letter-spacing: var(--ls-body);
    font-weight: 300;
    color: var(--ink-soft);
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  /* Divider between row groups */
  .member-row-group + .member-row-group {
    border-top: 1px solid var(--line);
    padding-top: 40px;
    margin-top: 40px;
  }
  .member-row-group + .member-row-group.no-top-border { border-top: none; padding-top: 0; }

  /* ============================================================
     FOOTER
     ============================================================ */
  .footer {
    padding: 56px 36px 40px;
    border-top: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    letter-spacing: var(--ls-small);
    opacity: 0.7;
  }

  /* ============================================================
     REVEAL
     ============================================================ */
  .reveal {
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 1.1s var(--ease-out), transform 1.1s var(--ease-out);
  }
  .reveal.is-visible { opacity: 1; transform: translateY(0); }
  .reveal.delay-1 { transition-delay: 0.12s; }
  .reveal.delay-2 { transition-delay: 0.24s; }
  .reveal.delay-3 { transition-delay: 0.36s; }

  /* ============================================================
     RESPONSIVE
     ============================================================ */
  @media (max-width: 1024px) {
    .member-drawer__inner { grid-template-columns: 1fr; gap: 28px; }
  }
  @media (max-width: 768px) {
    .nav { padding: 16px 22px; }
    .nav.is-scrolled { padding: 12px 22px; }
    .nav__links { gap: 16px; }
    .nav__link, .nav__link--trigger { font-size: 10px; letter-spacing: 0.18em; }
    .team-intro { padding: 80px 22px 60px; }
    .team-section { padding: 0 22px 80px; }
    .member-row { grid-template-columns: 1fr 1fr; gap: 16px; }
    .footer { padding: 36px 22px; }
  }
  @media (max-width: 500px) {
    .member-row { grid-template-columns: 1fr; }
  }

  /* MOBILE NAV */
  .nav__hamburger {
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 5px;
    width: 40px;
    height: 40px;
    background: none;
    border: none;
    cursor: pointer;
    z-index: 1002;
    padding: 6px;
    position: relative;
  }
  .nav__hamburger span {
    display: block;
    width: 22px;
    height: 1.5px;
    background: #fff;
    transition: transform 0.35s var(--ease), opacity 0.2s, width 0.3s var(--ease);
    transform-origin: center;
  }
  body.nav-open .nav__hamburger span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
  body.nav-open .nav__hamburger span:nth-child(2) { opacity: 0; width: 0; }
  body.nav-open .nav__hamburger span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }
  .nav__mobile {
    position: fixed;
    inset: 0;
    background: rgba(14, 14, 14, 0.97);
    backdrop-filter: blur(20px) saturate(140%);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
    z-index: 1000;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 100px 36px 60px;
    opacity: 0;
    pointer-events: none;
    transform: translateY(-10px);
    transition: opacity 0.38s var(--ease), transform 0.38s var(--ease);
  }
  .nav__mobile.is-open { opacity: 1; pointer-events: all; transform: translateY(0); }
  .nav__mobile-link {
    font-family: 'Murecho', sans-serif;
    font-size: clamp(34px, 10vw, 54px);
    font-weight: 300;
    letter-spacing: -0.06em;
    color: #fff;
    line-height: 1.15;
    display: block;
    padding: 14px 0;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    transition: opacity 0.25s;
  }
  .nav__mobile-link:first-child { border-top: 1px solid rgba(255,255,255,0.08); }
  .nav__mobile-sub {
    font-family: 'Murecho', sans-serif;
    font-size: clamp(22px, 7vw, 38px);
    font-weight: 300;
    letter-spacing: -0.05em;
    color: rgba(255,255,255,0.4);
    display: block;
    padding: 10px 0 10px 24px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    transition: opacity 0.25s;
  }
  @media (max-width: 768px) {
    .nav__links { display: none !important; }
    .nav__hamburger { display: flex; }
  }

  @media (max-width: 768px) {
    /* Inline bio panel inserted after the clicked card on mobile */
    .member-mobile-bio {
      grid-column: 1 / -1;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.45s var(--ease-out);
      border-top: 1px solid var(--line);
    }
    .member-mobile-bio.is-open { max-height: 600px; }
    .member-mobile-bio__inner {
      padding: 24px 0 20px;
    }
    .member-mobile-bio__name {
      font-family: 'Murecho', sans-serif;
      font-size: 22px;
      font-weight: 400;
      letter-spacing: -0.06em;
      margin-bottom: 4px;
    }
    .member-mobile-bio__role {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.5;
      margin-bottom: 18px;
    }
    .member-mobile-bio__text {
      font-size: 13px;
      line-height: 1.6;
      color: var(--ink-soft);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
  }
</style>
</head>

<!-- ============================================================
     SCRIPTS
     ============================================================ -->
<script>
  /* ---- Page ready ---- */
  window.addEventListener('DOMContentLoaded', () => {
    requestAnimationFrame(() => {
      document.body.classList.add('is-ready');
    });
  });

  /* ---- Nav scroll ---- */
  const nav = document.getElementById('nav');
  window.addEventListener('scroll', () => {
    nav.classList.toggle('is-scrolled', window.scrollY > 50);
  }, { passive: true });

  /* ---- Reveal on scroll ---- */
  const io = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('is-visible'); io.unobserve(e.target); } });
  }, { threshold: 0.12 });
  document.querySelectorAll('.reveal').forEach(el => io.observe(el));

  /* ---- Team member bios ---- */
  const bios = {
    alex: {
      name: 'Alex Milanoski',
      role: 'Partner',
      bio: [
        'Alex Milanoski is a real estate developer and co-founder of NewStreet, where he focuses on sourcing, structuring, and executing multifamily and mixed-use developments across Chicago and beyond.',
        'With experience spanning design, acquisitions, finance, construction, and asset management, Alex combines institutional-level discipline with entrepreneurial hustle. He is passionate about uncovering overlooked opportunities, solving complex development challenges, and creating projects that generate long-term value for investors and neighborhoods alike. Above all, he remains firmly “long Chicago” and optimistic about the city’s future.',
        'Outside of work, Alex enjoys travelling, skiing, cycling, sailing, and spending time outdoors with his wife and son.'
      ]
    },
    kyle: {
      name: 'Kyle Ruperto',
      role: 'Project Manager',
      bio: [
        'Kyle Ruperto is a Project Manager at NewStreet, where he oversees the execution of multifamily and mixed-use developments from pre-development through completion. He focuses on entitlements, design coordination, permitting, construction management, tenant coordination, and asset management, working closely with ownership, consultants, contractors, and stakeholders to deliver thoughtful, high-quality projects that create lasting value for both investors and the surrounding community.',
        'Kyle brings a detail-oriented, solutions-driven approach to complex real estate developments, with experience spanning luxury apartment communities, Class A retail centers, and large-scale mixed-use projects. Passionate about architecture, urban design, and construction, he enjoys navigating the challenges of development and transforming ambitious ideas into well-executed, enduring places. He is especially drawn to projects that enhance neighborhoods, strengthen communities, and contribute to the long-term growth of the cities they serve.',
        'Outside of work, Kyle enjoys CrossFit, running, exploring architecture and cities, and spending time outdoors.'
      ]
    },
    rafael: {
      name: 'Rafael Villasenor',
      role: 'Analyst',
      bio: [
        'Rafael Villasenor lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. He manages the day-to-day execution of Newstreet\'s development pipeline, from entitlements through construction completion.',
        'Before joining Newstreet, Rafael ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat. Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur.',
        'Rafael holds a [degree] from [university].'
      ]
    },
  };

  let openDrawer      = null;
  let openCard        = null;
  let openMobileBio   = null;
  let openMobileBioCard = null;

  function closeDrawer() {
    if (openDrawer) { openDrawer.classList.remove('is-open'); openDrawer = null; }
    if (openCard)   { openCard.classList.remove('is-open');   openCard   = null; }
  }

  function closeMobileBio() {
    if (openMobileBio)     { openMobileBio.remove();                       openMobileBio     = null; }
    if (openMobileBioCard) { openMobileBioCard.classList.remove('is-open'); openMobileBioCard = null; }
  }

  function openMember(card, drawerId, memberId) {
    const data = bios[memberId];
    if (!data) return;

    // ── MOBILE: inline bio directly below the card ──────────────────
    if (window.innerWidth <= 768) {
      if (openMobileBioCard === card) { closeMobileBio(); return; }
      closeMobileBio();

      const bio = document.createElement('div');
      bio.className = 'member-mobile-bio';
      bio.innerHTML = `
        <div class="member-mobile-bio__inner">
          <div class="member-mobile-bio__name">${data.name}</div>
          <div class="member-mobile-bio__role">${data.role}</div>
          <div class="member-mobile-bio__text">
            ${data.bio.map(p => `<p>${p}</p>`).join('')}
          </div>
        </div>
      `;
      card.insertAdjacentElement('afterend', bio);
      card.classList.add('is-open');
      requestAnimationFrame(() => bio.classList.add('is-open'));
      openMobileBio     = bio;
      openMobileBioCard = card;
      return;
    }

    // ── DESKTOP: row drawer at bottom of group ───────────────────────
    const drawer = document.getElementById(drawerId);
    if (!drawer) return;
    if (openCard === card) { closeDrawer(); return; }
    closeDrawer();

    drawer.querySelector('.member-drawer__inner').innerHTML = `
      <div class="member-drawer__name-block">
        <div class="member-drawer__name">${data.name}</div>
        <div class="member-drawer__role">${data.role}</div>
      </div>
      <div class="member-drawer__bio">
        ${data.bio.map(p => `<p>${p}</p>`).join('')}
      </div>
    `;
    drawer.classList.add('is-open');
    card.classList.add('is-open');
    openDrawer = drawer;
    openCard   = card;
    setTimeout(() => { card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }, 100);
  }

  document.querySelectorAll('.member-card').forEach(card => {
    const toggle   = card.querySelector('.member-card__toggle');
    const memberId = card.dataset.member;
    const rowIdx   = card.dataset.row;
    const drawerId = `drawer-row-${rowIdx}`;

    toggle.addEventListener('click', (e) => {
      e.stopPropagation();
      openMember(card, drawerId, memberId);
    });
    // Also allow clicking the card photo area
    card.querySelector('.member-card__photo').addEventListener('click', () => {
      openMember(card, drawerId, memberId);
    });
  });

  // Mobile nav
  (function() {
    const hamburger = document.querySelector('.nav__hamburger');
    const mobileMenu = document.querySelector('.nav__mobile');
    if (!hamburger || !mobileMenu) return;
    hamburger.addEventListener('click', function() {
      const isOpen = document.body.classList.toggle('nav-open');
      mobileMenu.classList.toggle('is-open', isOpen);
    });
    mobileMenu.querySelectorAll('a').forEach(function(link) {
      link.addEventListener('click', function() {
        document.body.classList.remove('nav-open');
        mobileMenu.classList.remove('is-open');
      });
    });
  })();
</script>

</body>
</html>
